---
nodeLinker: node-modules

# Suppress known-safe peer dependency version mismatch warnings:
# - @material-ui/core v4 with React 18 (works but declares ^16 || ^17)
# - eslint 10 with plugins declaring ^8 || ^9 (compatible via @eslint/compat)
# - prettier 3 with @spotify/prettier-config (declares ^2, works with 3)
# - eslint-plugin-react-hooks v7 with @spotify/eslint-config-react (declares ^4)
logFilters:
  - code: YN0060
    level: discard
  - code: YN0086
    level: discard
